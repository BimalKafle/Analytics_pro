services:
  app:
    build:
      context: ./docker/app
    container_name: analytics-app
    command: php artisan serve --host=0.0.0.0 --port=8000
    volumes:
      - ./backend:/var/www/html
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue-worker:
    build:
      context: ./docker/app
    container_name: analytics-queue-worker
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./backend:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: ./docker/app
    container_name: analytics-scheduler
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: analytics-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-creator_analytics}
      POSTGRES_USER: ${DB_USERNAME:-analytics}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-analytics} -d ${DB_DATABASE:-creator_analytics}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: analytics-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
